<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Network Monitor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
  
 <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

 <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Courier New', Courier, monospace; }
        .dashboard-container { padding: 20px; }
        .status-card { background: #1a1a1a; border-left: 5px solid #007bff; padding: 15px; margin-bottom: 20px; }
        .log-table { background: #1a1a1a; color: #00ff00; border: 1px solid #333; }
        .log-table thead { background: #333; color: white; }
        .severity-HIGH { color: #ff4d4d; font-weight: bold; } 
        .severity-MEDIUM { color: #ffa500; } 
        .severity-LOW { color: #00ff00; } 
    </style>
</head>
<body>

<div class="container-fluid dashboard-container">
    <div class="row">
        <div class="col-12">
            <h2 class="mb-4">🛡️ Real-Time Network Threat Monitor</h2>
            <div class="status-card">
                <strong>System Status:</strong> <span id="status" class="text-success">Connected</span> | 
                <strong>Active Logs:</strong> <span id="log-count">0</span>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="table-responsive">
                <table class="table table-dark table-hover log-table" id="log-stream">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Source IP</th>
                            <th>Event Type</th>
                            <th>Severity</th>
                            <th>Message</th>
                        </tr>
                    </thead>
                    <tbody id="log-body">
                       
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
   
    const socket = io();

    const logBody = document.getElementById('log-body');
    const logCountElement = document.getElementById('log-count');
    let logCount = 0;

   
    socket.on('new_event', function(data) {
        logCount++;
        logCountElement.innerText = logCount;


        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${new Date().toLocaleTimeString()}</td>
            <td>${data.ip}</td>
            <td>${data.type || 'NETWORK_TRAFFIC'}</td>
            <td class="severity-${data.severity}">${data.severity}</td>
            <td>${data.msg}</td>
        `;

     
        logBody.insertBefore(row, logBody.firstChild);

        if (logBody.children.length > 50) {
            logBody.removeChild(logBody.lastChild);
        }
    });

    socket.on('connect', () => {
        document.getElementById('status').innerText = "Connected";
        document.getElementById('status').className = "text-success";
    });

    socket.on('disconnect', () => {
        document.getElementById('status').innerText = "Disconnected";
        document.getElementById('status').className = "text-danger";
    });
</script>

</body>
</html>
